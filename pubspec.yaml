name: ai_tutor
description: AI-powered tutor app with handwriting, document annotation, quizzes, and voice tutoring.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Shared core (local path; switch to git dep once flowforge has a remote)
  shared_core:
    path: ../flowforge/packages/shared_core

  # State management
  provider: ^6.1.2

  # Database
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5
  path: ^1.9.1

  # UI
  google_fonts: ^6.2.1

  # Networking & AI
  http: ^1.2.0

  # Security
  flutter_secure_storage: ^9.2.4

  # PDF
  pdfrx: ^1.0.98

  # File picking
  file_picker: ^8.1.7

  # Speech
  speech_to_text: ^7.2.0
  flutter_tts: ^4.2.0

  # Utilities
  uuid: ^4.5.1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.25.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
